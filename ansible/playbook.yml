---
- name: Full Node Setup
  hosts: all
  become: yes
  tasks:
    - name: Configure Netplan (Static IP)
      copy:
        dest: /etc/netplan/01-static-ip.yaml
        content: |
          network:
            version: 2
            ethernets:
              {{ interface_name }}:
                dhcp4: no
                addresses:
                  - {{ static_ip }}/24
                routes:
                  - to: default
                    via: {{ gateway }}
                nameservers:
                  addresses: [{{ dns_server }}]
      notify: Apply Netplan

    - name: Install Docker and Compose
      apt:
        name: [docker.io, docker-compose-v2]
        state: present
        update_cache: yes

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Set permissions for docker.sock
      file:
        path: /var/run/docker.sock
        mode: '0666'

    - name: Create runner directory
      file:
        path: /opt/github-runner
        state: directory

    - name: Deploy .env with PAT
      template:
        src: runner.env.j2
        dest: /opt/github-runner/.env
        mode: '0600'

  handlers:
    - name: Apply Netplan
      shell: "sleep 2 && netplan apply"
      async: 10
      poll: 0