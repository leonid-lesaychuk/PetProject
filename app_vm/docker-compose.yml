services:
  web:
    restart: &restart-policy unless-stopped
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    ports:
      - "5000:5000"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: '256M'

  cadvisor:
    restart: *restart-policy
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    ports:
      - "8081:8080"

  github-runner:
    image: myoung34/github-runner:latest
    container_name: github-runner
    restart: always
    environment:
      - REPO_URL=https://github.com/leonid-lesaychuk/PetProject
      - RUNNER_TOKEN=${RUNNER_TOKEN}
      - RUNNER_NAME=infra-runner
      - LABELS=${LABELS}
      - RUNNER_WORKDIR=/_work
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /_work:/_work
      - runner_data:/home/runner

volumes:
  runner_data: