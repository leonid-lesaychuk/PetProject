services:
  web:
    restart: &restart-policy unless-stopped
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    ports:
      - "5000:5000"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: '256M'