services:
  web:
    restart: &restart-policy unless-stopped
    build:
      context: .
      dockerfile: ./app/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: db
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - olga2_network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: '256M'

  db:
    restart: *restart-policy
    image: postgres:latest
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql/data
    networks:
      - olga2_network

  nginx:
    restart: *restart-policy
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - olga2_network

  load-gen:
    restart: *restart-policy
    build: ./load-gen
    networks:
      - olga2_network
    depends_on:
      - nginx

  prometheus:
    restart: *restart-policy
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - olga2_network
    deploy:
      resources:
        limits:
          memory: 256M


  grafana:
    restart: *restart-policy
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - olga2_network

  cadvisor:
    restart: *restart-policy
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - olga2_network
    privileged: true


volumes:
  db_data:

networks:
  olga2_network: {}